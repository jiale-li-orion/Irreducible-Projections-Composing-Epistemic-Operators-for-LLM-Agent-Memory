<svg width="1500" height="800" viewBox="0 0 1500 800" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.title  { font: 700 28px 'Times New Roman', serif; fill:#111; }
.hdr    { font: 700 20px 'Times New Roman', serif; }
.big-num{ font: 700 44px 'Times New Roman', serif; fill:#B22222; }
.label  { font: 16px 'Times New Roman', serif; fill:#000; }
.small  { font: 14px 'Times New Roman', serif; fill:#222; }
.tiny   { font: 12px 'Times New Roman', serif; fill:#444; }
.bold   { font: 700 14px 'Times New Roman', serif; fill:#000; }
.ital   { font: italic 14px 'Times New Roman', serif; fill:#333; }

.blue   { fill:#1F4E79; } .b-bg { fill:#E8EEF5; } .b-stk { stroke:#1F4E79; }
.orange { fill:#A64B00; } .o-bg { fill:#FDF0E0; } .o-stk { stroke:#A64B00; }
.green  { fill:#2E6B3E; } .g-bg { fill:#E5F5EE; } .g-stk { stroke:#2E6B3E; }
.red    { fill:#B22222; }

.panel { fill:#FDFDFD; stroke-width:2.5; rx:8; }
.cell  { rx:3; stroke:#555; stroke-width:0.8; }
.bar   { rx:4; }

.arr { stroke:#555; stroke-width:1.8; fill:none; }
.divider { stroke:#CCC; stroke-width:1.5; stroke-dasharray:6 4; }
marker#a polygon { fill:#555; }
</style>
<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7"/>
</marker>
</defs>

<!-- ═══ TITLE ═══ -->
<text x="60" y="45" class="title">Figure 5 — Operator Complementarity Is Model-Independent, Optimal Routing Is Model-Conditioned</text>

<!-- ============================ (a) LEFT ============================ -->
<rect x="35" y="75" width="700" height="685" class="panel b-stk"/>

<rect x="35" y="75" width="700" height="40" rx="8" fill="#1F4E79"/>
<rect x="35" y="103" width="700" height="12" fill="#1F4E79"/>
<text x="385" y="101" text-anchor="middle" fill="white" class="hdr">(a) 𝒮ₜ failures are invariant across models (29/112 cases)</text>

<!-- Failure distribution: 8 patterns as horizontal bars -->
<text x="60" y="155" class="bold">Cross-model invariant failures by pattern (𝒮ₜ)</text>

<!-- Bar chart of S_T failures per pattern -->
<text x="45" y="185" class="small">past_state</text>
<rect x="180" y="173" width="400" height="16" class="bar" fill="#A64B00" opacity="0.9"/>
<text x="590" y="186" class="bold orange">9/12 (75%)</text>

<text x="45" y="215" class="small">cross_entity</text>
<rect x="180" y="203" width="310" height="16" class="bar" fill="#A64B00" opacity="0.85"/>
<text x="500" y="216" class="bold orange">7/16 (44%)</text>

<text x="45" y="245" class="small">implicit_conflict</text>
<rect x="180" y="233" width="210" height="16" class="bar" fill="#A64B00" opacity="0.75"/>
<text x="400" y="246" class="bold">6/12</text>

<text x="45" y="275" class="small">negative_evidence</text>
<rect x="180" y="263" width="185" height="16" class="bar" fill="#A64B00" opacity="0.7"/>
<text x="375" y="276" class="bold">5/12</text>

<text x="45" y="305" class="small">multi_path</text>
<rect x="180" y="293" width="120" height="16" class="bar" fill="#A64B00" opacity="0.6"/>
<text x="310" y="306" class="bold">4/12</text>

<text x="45" y="335" class="small">correction_chain</text>
<rect x="180" y="323" width="80" height="16" class="bar" fill="#A64B00" opacity="0.5"/>
<text x="270" y="336" class="bold">3/12</text>

<text x="45" y="365" class="small">temporal_rel.</text>
<rect x="180" y="353" width="50" height="16" class="bar" fill="#A64B00" opacity="0.4"/>
<text x="240" y="366" class="bold">2/12</text>

<text x="45" y="395" class="small">ambiguous</text>
<rect x="180" y="383" width="40" height="16" class="bar" fill="#A64B00" opacity="0.35"/>
<text x="230" y="396" class="bold">2/12</text>

<text x="80" y="430" class="ital">Total: 29/112 cross-model failures on 𝒮ₜ. Wrong answers near-verbatim identical.</text>

<!-- Contrast: R_T and T_T -->
<rect x="45" y="460" width="660" height="110" rx="8" class="b-bg"/>
<text x="375" y="488" text-anchor="middle" class="hdr blue">For comparison: ℛₜ and 𝒯ₜ</text>
<text x="375" y="520" text-anchor="middle" class="label">Only 4 of 112 cases fail across all models for ℛₜ — same for 𝒯ₜ.</text>
<text x="375" y="548" text-anchor="middle" class="small">𝒮ₜ is representation-limited (structural loss at construction time).</text>
<text x="375" y="568" text-anchor="middle" class="small">ℛₜ and 𝒯ₜ are model-dependent (geometry/routing varies with backbone).</text>

<!-- Concrete example -->
<rect x="45" y="590" width="660" height="80" rx="6" fill="#FDF0E0" stroke="#A64B00" stroke-width="1.5"/>
<text x="375" y="618" text-anchor="middle" class="bold orange">Example: past_state — "Where was Alice before moving to Chicago?" (ground truth: Boston)</text>
<text x="375" y="645" text-anchor="middle" class="small">
  DS Flash: Chicago  |  DS V4 Pro: Chicago  |  GPT-4o-mini: Chicago  |  Claude S4: Chicago
</text>
<text x="375" y="665" text-anchor="middle" class="tiny">All four models give the same wrong answer — failure imposed at representation time, not reasoning time.</text>

<!-- ============================ DIVIDER ============================ -->
<line x1="750" y1="75" x2="750" y2="760" class="divider"/>

<!-- ============================ (b) RIGHT ============================ -->
<rect x="765" y="75" width="700" height="685" class="panel g-stk"/>

<rect x="765" y="75" width="700" height="40" rx="8" fill="#2E6B3E"/>
<rect x="765" y="103" width="700" height="12" fill="#2E6B3E"/>
<text x="1115" y="101" text-anchor="middle" fill="white" class="hdr">(b) Best operator shifts across models (7/8 patterns)</text>

<!-- 8×4 heatmap -->
<text x="790" y="150" class="bold">Per-pattern best operator across four backbone LLMs</text>

<!-- Column headers -->
<text x="980" y="180" text-anchor="middle" class="small">DS Flash</text>
<text x="1080" y="180" text-anchor="middle" class="small">DS V4 Pro</text>
<text x="1180" y="180" text-anchor="middle" class="small">GPT-4o-mini</text>
<text x="1280" y="180" text-anchor="middle" class="small">Claude S4</text>

<!-- Row data: 8 patterns × 4 models -->
<!-- past_state: R R R R -->
<rect x="930" y="193" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1030" y="193" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1130" y="193" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1230" y="193" width="85" height="24" class="cell" fill="#1F4E79"/>
<text x="800" y="212" class="small">past_state</text>
<text x="1370" y="212" class="ital" fill="#1F4E79">← only invariant</text>

