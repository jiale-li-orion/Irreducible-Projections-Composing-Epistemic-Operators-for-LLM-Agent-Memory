<rect x="930" y="223" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1030" y="223" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1130" y="223" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1230" y="223" width="85" height="24" class="cell" fill="#1F4E79"/>
<text x="800" y="242" class="small">temporal_rel.</text>

<!-- correction_chain: S R S S -->
<rect x="930" y="253" width="85" height="24" class="cell" fill="#A64B00"/>
<rect x="1030" y="253" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1130" y="253" width="85" height="24" class="cell" fill="#A64B00"/>
<rect x="1230" y="253" width="85" height="24" class="cell" fill="#A64B00"/>
<text x="800" y="272" class="small">correction_chain</text>

<!-- cross_entity: T R T T -->
<rect x="930" y="283" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1030" y="283" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1130" y="283" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1230" y="283" width="85" height="24" class="cell" fill="#2E6B3E"/>
<text x="800" y="302" class="small">cross_entity</text>

<!-- implicit_conflict: R R T R -->
<rect x="930" y="313" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1030" y="313" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1130" y="313" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1230" y="313" width="85" height="24" class="cell" fill="#1F4E79"/>
<text x="800" y="332" class="small">implicit_conflict</text>

<!-- multi_path: R S T T -->
<rect x="930" y="343" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1030" y="343" width="85" height="24" class="cell" fill="#A64B00"/>
<rect x="1130" y="343" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1230" y="343" width="85" height="24" class="cell" fill="#2E6B3E"/>
<text x="800" y="362" class="small">multi_path</text>

<!-- negative_evidence: R R T T -->
<rect x="930" y="373" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1030" y="373" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1130" y="373" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1230" y="373" width="85" height="24" class="cell" fill="#2E6B3E"/>
<text x="800" y="392" class="small">negative_evid.</text>

<!-- ambiguous: R R T R -->
<rect x="930" y="403" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1030" y="403" width="85" height="24" class="cell" fill="#1F4E79"/>
<rect x="1130" y="403" width="85" height="24" class="cell" fill="#2E6B3E"/>
<rect x="1230" y="403" width="85" height="24" class="cell" fill="#1F4E79"/>
<text x="800" y="422" class="small">ambiguous</text>

<!-- Legend for heatmap -->
<rect x="1320" y="180" width="130" height="118" rx="6" fill="white" stroke="#999" stroke-width="1.2"/>
<rect x="1335" y="194" width="18" height="18" rx="3" fill="#1F4E79"/>
<text x="1362" y="210" class="small">ℛₜ  best</text>
<rect x="1335" y="222" width="18" height="18" rx="3" fill="#A64B00"/>
<text x="1362" y="238" class="small">𝒮ₜ  best</text>
<rect x="1335" y="250" width="18" height="18" rx="3" fill="#2E6B3E"/>
<text x="1362" y="266" class="small">𝒯ₜ  best</text>

<!-- Summary bars: best operator per model -->
<rect x="790" y="470" width="630" height="170" rx="8" fill="#F8F8F8" stroke="#DDD"/>

<text x="1105" y="498" text-anchor="middle" class="bold">Best single operator differs by model family</text>

<!-- DS Flash -->
<text x="830" y="535" class="label">DS Flash</text>
<rect x="930" y="520" width="80" height="30" class="bar" fill="#1F4E79"/>
<text x="970" y="542" text-anchor="middle" fill="white" class="bold">ℛₜ  0.679</text>

<text x="830" y="575" class="label">DS V4 Pro</text>
<rect x="930" y="560" width="80" height="30" class="bar" fill="#1F4E79"/>
<text x="970" y="582" text-anchor="middle" fill="white" class="bold">ℛₜ  0.839</text>

<text x="1050" y="558" class="ital" fill="#888">DeepSeek → ℛₜ</text>

<line x1="1080" y1="470" x2="1080" y2="640" stroke="#BBB" stroke-width="1" stroke-dasharray="4 3"/>

<!-- GPT / Claude -->
<text x="1120" y="535" class="label">GPT-4o-mini</text>
<rect x="1250" y="520" width="80" height="30" class="bar" fill="#2E6B3E"/>
<text x="1290" y="542" text-anchor="middle" fill="white" class="bold">𝒯ₜ  0.812</text>

<text x="1120" y="575" class="label">Claude S4</text>
<rect x="1250" y="560" width="80" height="30" class="bar" fill="#2E6B3E"/>
<text x="1290" y="582" text-anchor="middle" fill="white" class="bold">𝒯ₜ  0.830</text>

<text x="1370" y="558" class="ital" fill="#888">GPT/Claude → 𝒯ₜ</text>

<!-- Bottom claim -->
<rect x="800" y="660" width="610" height="55" rx="8" class="g-bg" stroke="#2E6B3E" stroke-width="1.5"/>
<text x="1105" y="686" text-anchor="middle" class="hdr green">7/8 patterns shift — no universal routing table exists</text>
<text x="1105" y="708" text-anchor="middle" class="small">Model calibration is not optional (Step 2 of §5.3).</text>

<!-- ═══ GLOBAL BOTTOM ═══ -->
<rect x="80" y="770" width="1340" height="28" rx="6" fill="#FAFAFA" stroke="#CCC"/>
<text x="750" y="789" text-anchor="middle" class="small">Operator complementarity is model-independent. Optimal routing is model-conditioned. Both are structural.</text>

</svg>