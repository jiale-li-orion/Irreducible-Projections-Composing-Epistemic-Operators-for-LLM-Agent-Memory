<svg width="1600" height="780" viewBox="0 0 1600 780" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.title   { font: 700 30px 'Times New Roman', serif; fill:#111; }
.section { font: 700 23px 'Times New Roman', serif; }
.label   { font: 16px 'Times New Roman', serif; fill:#222; }
.small   { font: 16px 'Times New Roman', serif; fill:#333; }
.tiny    { font: 14px 'Times New Roman', serif; fill:#444; }

.blue-fill    { fill:#1F4E79; }  .blue-stroke   { stroke:#1F4E79; }
.orange-fill  { fill:#A64B00; }  .orange-stroke { stroke:#A64B00; }
.green-fill   { fill:#2E6B3E; }  .green-stroke  { stroke:#2E6B3E; }
.red-fill     { fill:#B22222; }  .red-stroke    { stroke:#B22222; }

.panel  { fill:#FDFDFD; stroke-width: 2.5; rx: 14; }
.bg-bar { fill:#F6F6F6; stroke:#DDD; stroke-width: 1.2; rx: 10; }

.event-box   { fill:white; stroke:#555; stroke-width: 1.3; rx: 8; }
.fade-box    { fill:white; stroke:#AAA; stroke-width: 1; stroke-dasharray:6 4; rx: 8; }
.collapse-box{ rx: 10; stroke-width: 1.8; }
.tl-node     { fill:white; stroke:#555; stroke-width: 2; }
.chain-node  { fill:white; stroke-width: 2; }

.arrow { stroke:#444; stroke-width: 2; fill:none; }
marker#arr polygon { fill:#444; }
</style>
<marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7"/>
</marker>
</defs>

<!-- ═══ TITLE ═══ -->
<text x="60" y="52" class="title">Figure 1 — Irreducible Epistemic Projections over a Shared Memory Trajectory</text>

<!-- ═══ SHARED TRAJECTORY ═══ -->
<rect x="50" y="75" width="1500" height="145" class="bg-bar"/>
<text x="800" y="105" text-anchor="middle" class="section">Shared Memory Trajectory  T = {e₁, e₂, e₃, e₄, e₅}</text>

<line x1="120" y1="160" x2="1480" y2="160" class="arrow" marker-end="url(#arr)"/>

<circle cx="250" cy="160" r="14" class="tl-node"/><text x="248" y="143" class="math">e₁</text>
<circle cx="487" cy="160" r="14" class="tl-node"/><text x="485" y="143" class="math">e₂</text>
<circle cx="724" cy="160" r="14" class="tl-node"/><text x="722" y="143" class="math">e₃</text>
<circle cx="961" cy="160" r="14" class="tl-node"/><text x="959" y="143" class="math">e₄</text>
<circle cx="1198" cy="160" r="14" class="tl-node"/><text x="1196" y="143" class="math">e₅</text>

<!-- Event boxes -->
<rect x="160" y="178" width="180" height="50" class="event-box"/>
<text x="250" y="199" text-anchor="middle" class="label">A: Alice → Seattle</text>
<text x="250" y="218" text-anchor="middle" class="tiny">t₁</text>

<rect x="397" y="178" width="180" height="50" class="event-box"/>
<text x="487" y="199" text-anchor="middle" class="label">B: Alice → Boston</text>
<text x="487" y="218" text-anchor="middle" class="tiny">t₂</text>

<rect x="634" y="178" width="180" height="50" class="event-box"/>
<text x="724" y="199" text-anchor="middle" class="label">C: Bob → Seattle</text>
<text x="724" y="218" text-anchor="middle" class="tiny">t₃</text>

<rect x="871" y="178" width="180" height="50" class="event-box"/>
<text x="961" y="199" text-anchor="middle" class="label">D: Alice → Chicago</text>
<text x="961" y="218" text-anchor="middle" class="tiny">t₄</text>

<rect x="1108" y="178" width="180" height="50" class="event-box" stroke="#B22222" stroke-width="2"/>
<text x="1198" y="199" text-anchor="middle" class="label red-fill">E: Alice no longer</text>
<text x="1198" y="218" text-anchor="middle" class="tiny red-fill">in Boston (t₅)</text>

<!-- ═══ THREE PANELS ═══ -->

<!-- ── R_T ── -->
<rect x="50" y="260" width="470" height="380" class="panel blue-stroke"/>
<text x="285" y="293" text-anchor="middle" class="section blue-fill">Retrieval Projection  ℛₜ</text>
<text x="285" y="317" text-anchor="middle" class="small blue-fill">top-K semantic retrieval over unordered artifact pool</text>

<!-- Retrieved: solid -->
<rect x="120" y="348" width="150" height="52" class="event-box"/>
<text x="195" y="370" text-anchor="middle" class="label">A: Alice → Seattle</text>
<text x="195" y="390" text-anchor="middle" class="tiny">t₁</text>

<rect x="320" y="343" width="150" height="52" class="event-box"/>
<text x="395" y="365" text-anchor="middle" class="label">C: Bob → Seattle</text>
<text x="395" y="385" text-anchor="middle" class="tiny">t₃</text>

<rect x="210" y="445" width="150" height="52" class="event-box"/>
<text x="285" y="467" text-anchor="middle" class="label">D: Alice → Chicago</text>
<text x="285" y="487" text-anchor="middle" class="tiny">t₄</text>

<!-- Not retrieved: dashed -->
<rect x="100" y="488" width="140" height="46" class="fade-box" opacity="0.4"/>
<text x="170" y="512" text-anchor="middle" class="tiny">B: Alice → Boston</text>

<rect x="340" y="482" width="160" height="46" class="fade-box" opacity="0.4" stroke="#B22222"/>
<text x="420" y="506" text-anchor="middle" class="tiny red-fill">E: Alice not in Bost.  #8</text>

<!-- top-K ellipse -->
<ellipse cx="285" cy="420" rx="165" ry="100" fill="none" stroke="#1F4E79" stroke-width="1.8" stroke-dasharray="8 5" opacity="0.5"/>
<text x="395" y="405" text-anchor="middle" class="italic blue-fill">top-K</text>

<rect x="85" y="570" width="400" height="42" class="collapse-box" fill="#E6EEF5" stroke="#1F4E79"/>
<text x="285" y="596" text-anchor="middle" class="label blue-fill">Visibility Collapse — contradictory evidence non-co-present</text>

<!-- ── S_T ── -->
<rect x="565" y="260" width="470" height="380" class="panel orange-stroke"/>
<text x="800" y="293" text-anchor="middle" class="section orange-fill">State Projection  𝒮ₜ</text>
<text x="800" y="316" text-anchor="middle" class="small orange-fill">compressed belief state, write-time revision  U</text>

<!-- Scattered trajectory dissolving into state -->
<g>
  <rect x="610" y="332" width="130" height="42" class="event-box"/>
  <text x="675" y="350" text-anchor="middle" class="small">A: Alice → Seattle</text>

  <rect x="740" y="344" width="130" height="42" class="event-box"/>
  <text x="805" y="362" text-anchor="middle" class="small">B: Alice → Boston</text>

  <rect x="650" y="390" width="130" height="42" class="event-box"/>
  <text x="715" y="408" text-anchor="middle" class="small">C: Bob → Seattle</text>

  <rect x="780" y="405" width="130" height="42" class="event-box"/>
  <text x="845" y="423" text-anchor="middle" class="small">D: Alice → Chicago</text>

  <rect x="910" y="440" width="145" height="42" class="event-box"/>
  <text x="983" y="458" text-anchor="middle" class="small">E: Alice not in Boston</text>
</g>

<line x1="800" y1="455" x2="800" y2="480" stroke="#A64B00" stroke-width="2" marker-end="url(#arr)"/>

<!-- Belief state KV -->
<rect x="655" y="490" width="290" height="58" rx="8" fill="white" stroke="#A64B00" stroke-width="2"/>
<text x="685" y="514" class="label">Alice.location = Chicago</text>
<text x="685" y="534" class="label">Bob.location   = Seattle</text>

<!-- U -->
<text x="800" y="572" text-anchor="middle" class="small orange-fill">U: write-time conflict resolution</text>

<rect x="585" y="580" width="430" height="42" class="collapse-box" fill="#FDF0E0" stroke="#A64B00"/>
<text x="800" y="606" text-anchor="middle" class="label orange-fill">Temporal Collapse — historical queries structurally unaskable</text>

<!-- ── T_T ── -->
<rect x="1080" y="250" width="470" height="390" class="panel green-stroke"/>
<text x="1315" y="283" text-anchor="middle" class="section green-fill">Trajectory Projection  𝒯ₜ</text>
<text x="1315" y="307" text-anchor="middle" class="small green-fill">chronological walk over transition graph  G</text>

<!-- Snake chain — fill panel -->
<circle cx="1110" cy="400" r="36" class="chain-node" stroke="#2E6B3E"/>
<text x="1110" y="392" text-anchor="middle" class="small">A: Alice</text>
<text x="1110" y="410" text-anchor="middle" class="small">→ Seattle</text>

<circle cx="1215" cy="460" r="36" class="chain-node" stroke="#2E6B3E"/>
<text x="1215" y="452" text-anchor="middle" class="small">B: Alice</text>
<text x="1215" y="470" text-anchor="middle" class="small">→ Boston</text>

<circle cx="1310" cy="395" r="36" class="chain-node" stroke="#2E6B3E"/>
<text x="1310" y="387" text-anchor="middle" class="small">C: Bob</text>
<text x="1310" y="405" text-anchor="middle" class="small">→ Seattle</text>

<circle cx="1415" cy="480" r="36" class="chain-node" stroke="#2E6B3E"/>
<text x="1415" y="472" text-anchor="middle" class="small">D: Alice</text>
<text x="1415" y="490" text-anchor="middle" class="small">→ Chicago</text>

<circle cx="1515" cy="420" r="42" class="chain-node" stroke="#2E6B3E"/>
<text x="1515" y="410" text-anchor="middle" class="small">E: Alice not</text>
<text x="1515" y="430" text-anchor="middle" class="small">in Boston</text>

<!-- Arrows -->
<line x1="1146" y1="415" x2="1179" y2="448" stroke="#2E6B3E" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="1251" y1="448" x2="1274" y2="408" stroke="#2E6B3E" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="1346" y1="408" x2="1379" y2="465" stroke="#2E6B3E" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="1451" y1="465" x2="1473" y2="438" stroke="#2E6B3E" stroke-width="2.5" marker-end="url(#arr)"/>

<!-- e labels -->
<text x="1104" y="455" text-anchor="middle" class="tiny">e₁</text>
<text x="1209" y="515" text-anchor="middle" class="tiny">e₂</text>
<text x="1304" y="450" text-anchor="middle" class="tiny">e₃</text>
<text x="1409" y="535" text-anchor="middle" class="tiny">e₄</text>
<text x="1515" y="480" text-anchor="middle" class="tiny">e₅</text>

<rect x="1100" y="575" width="430" height="42" class="collapse-box" fill="#E5F5EE" stroke="#2E6B3E"/>
<text x="1315" y="601" text-anchor="middle" class="label green-fill">Compression Collapse — complete witness, non-compressible</text>

<!-- ═══ MAIN CLAIM ═══ -->
<rect x="180" y="660" width="1240" height="75" rx="12" fill="#F8F8F8" stroke="#CCC" stroke-width="1.5"/>
<text x="800" y="696" text-anchor="middle" class="section">No single projection preserves all epistemic dimensions simultaneously.</text>
<text x="800" y="722" text-anchor="middle" class="label" fill="#6B3FA0">Operator composition is structurally necessary.</text>

</svg>